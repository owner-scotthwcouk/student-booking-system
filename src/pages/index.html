<!DOCTYPE html>
<html lang="en">

    <style>
        body { font-family: sans-serif; margin: 0; background: #f3f4f6; color: #111827; }
        .container { max-width: 1280px; margin: 0 auto; padding: 1rem; }
        .card { background: #fff; border: 1px solid #d1d5db; border-radius: 10px; padding: 1rem; margin-bottom: 1rem; }
        .grid-layout { display: grid; grid-template-columns: 2fr 1fr; gap: 1rem; }
        .video-container { border-radius: 12px; overflow: hidden; border: 1px solid #d1d5db; background: #000; height: 75vh; }
        .sidebar-section { background: #fff; border: 1px solid #d1d5db; border-radius: 10px; padding: 0.8rem; margin-bottom: 1rem; }
        .scroll-area { max-height: 220px; overflow-y: auto; margin-bottom: 0.5rem; }
        canvas { width: 100%; border: 1px solid #d1d5db; border-radius: 8px; background: #fff; touch-action: none; }
        button { padding: 0.6rem 1rem; cursor: pointer; border: 1px solid #d1d5db; background: #fff; border-radius: 6px; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div id="main-content" class="container">
    <div class="header">
        <h2 style="margin: 0;">Lesson Video Room</h2>
    </div>

    <div id="passcode-section" class="card">
        <h3>Enter Room Passcode</h3>
        <div style="display: flex; gap: 0.5rem;">
            <input type="text" id="passcode-input" placeholder="6-digit passcode" style="flex: 1; padding: 0.5rem;">
            <button id="verify-btn" onclick="handleVerifyPasscode()">Verify</button>
        </div>
    </div>

    <div id="room-interface" class="grid-layout hidden">
        <div>
            <div style="display: flex; gap: 0.5rem; margin-bottom: 0.75rem;">
                <button onclick="toggleWhiteboard()">Open Whiteboard</button>
            </div>
            <div id="whiteboard-section" class="card hidden">
                <canvas id="whiteboard-canvas" width="1280" height="420"></canvas>
            </div>
            <div id="jaas-container" class="video-container"></div>
        </div>

        <div class="sidebar">
            <div class="sidebar-section">
                <h3>Chat</h3>
                <div id="chat-box" class="scroll-area"></div>
                <div style="display: flex; gap: 0.5rem;">
                    <input type="text" id="chat-input" placeholder="Type a message" style="flex: 1;">
                    <button onclick="handleSendMessage()">Send</button>
                </div>
            </div>
        </div>
    </div>
</div>

    function handleVerifyPasscode() {
        const input = document.getElementById('passcode-input').value;
        if (input) {
            document.getElementById('passcode-section').classList.add('hidden');
            document.getElementById('room-interface').classList.remove('hidden');
            startMeeting();
        }
    }

    function startMeeting() {
        const domain = "8x8.vc";
        const options = {
            roomName: `vpaas-magic-cookie-${APP_ID}/TutorHubMeeting`,
            width: "100%",
            height: "100%",
            parentNode: document.querySelector('#jaas-container'),
            jwt: JWT_TOKEN,
            userInfo: {
                displayName: 'Participant'
            }
        };
        new JitsiMeetExternalAPI(domain, options);
    }

    function toggleWhiteboard() {
        const section = document.getElementById('whiteboard-section');
        section.classList.toggle('hidden');
    }

    function handleSendMessage() {
        const input = document.getElementById('chat-input');
        if (input.value) {
            const msg = document.createElement('p');
            msg.textContent = "Me: " + input.value;
            document.getElementById('chat-box').appendChild(msg);
            input.value = "";
        }
    }

    const canvas = document.getElementById('whiteboard-canvas');
    const ctx = canvas.getContext('2d');
    let drawing = false;
    canvas.addEventListener('pointerdown', () => drawing = true);
    canvas.addEventListener('pointerup', () => { drawing = false; ctx.beginPath(); });
    canvas.addEventListener('pointermove', (e) => {
        if (!drawing) return;
        const rect = canvas.getBoundingClientRect();
        ctx.lineWidth = 3;
        ctx.lineCap = 'round';
        ctx.lineTo((e.clientX - rect.left) * (canvas.width / rect.width), (e.clientY - rect.top) * (canvas.height / rect.height));
        ctx.stroke();
    });
</script>
